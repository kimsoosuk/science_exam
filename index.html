      "https://res.cloudinary.com/dms5vyofw/image/upload/v1771816948/2025_%E1%84%80%E1%85%A91_3%E1%84%86%E1%85%A9_%E1%84%80%E1%85%AA%E1%84%92%E1%85%A1%E1%86%A8_16_h39doz.png",
      "https://res.cloudinary.com/dms5vyofw/image/upload/v1771816950/2025_%E1%84%80%E1%85%A91_3%E1%84%86%E1%85%A9_%E1%84%80%E1%85%AA%E1%84%92%E1%85%A1%E1%86%A8_17_nn8yas.png",
      "https://res.cloudinary.com/dms5vyofw/image/upload/v1771816955/2025_%E1%84%80%E1%85%A91_3%E1%84%86%E1%85%A9_%E1%84%80%E1%85%AA%E1%84%92%E1%85%A1%E1%86%A8_18_vdnfjw.png",
      "https://res.cloudinary.com/dms5vyofw/image/upload/v1771816951/2025_%E1%84%80%E1%85%A91_3%E1%84%86%E1%85%A9_%E1%84%80%E1%85%AA%E1%84%92%E1%85%A1%E1%86%A8_19_ccetjn.png",
      "https://res.cloudinary.com/dms5vyofw/image/upload/v1771816953/2025_%E1%84%80%E1%85%A91_3%E1%84%86%E1%85%A9_%E1%84%80%E1%85%AA%E1%84%92%E1%85%A1%E1%86%A8_20_mqrqwc.png"
    ];

    const SUBJECT_MAPPING = [
      '지구과학', '지구과학', '생명과학', '화학',
      '생명과학', '물리', '화학', '생명과학',
      '물리', '지구과학', '생명과학', '지구과학',
      '물리', '물리', '생명과학', '지구과학',
      '물리', '생명과학', '화학', '지구과학'
    ];

    const CORRECT_ANSWERS = [
      4, 4, 3, 4, 5,
      5, 4, 5, 2, 1,
      3, 2, 1, 1, 3,
      3, 2, 2, 3, 5
    ];

    const INITIAL_PROBLEMS = MOCK_IMAGE_URLS.map((url, index) => ({
      id: `p${index + 1}`,
      number: index + 1,
      subject: SUBJECT_MAPPING[index],
      imageUrl: url,
      correctAnswer: CORRECT_ANSWERS[index]
    }));

    // --- UTILS ---
    const extractString = (val) => {
      if (!val) return '';
      if (typeof val === 'string') return val;
      if (typeof val === 'object') return val.name || val.term || val.title || JSON.stringify(val);
      return String(val);
    };

    const cleanTextStr = (val) => {
      let str = extractString(val);
      str = str.replace(/[\u{1F600}-\u{1F64F}\u{1F300}-\u{1F5FF}\u{1F680}-\u{1F6FF}\u{1F700}-\u{1F77F}\u{1F780}-\u{1F7FF}\u{1F800}-\u{1F8FF}\u{1F900}-\u{1F9FF}\u{1FA00}-\u{1FA6F}\u{1FA70}-\u{1FAFF}\u{1FAB0}-\u{1FABF}\u{1FAC0}-\u{1FAFF}\u{1F1E6}-\u{1F1FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}]/gu, '');
      str = str.replace(/#/g, '');
      return str.trim();
    };

    const cleanTitleStr = (val) => {
      let str = cleanTextStr(val);
      return str.replace(/\*/g, '').replace(/_/g, '');
    };

    const renderWithBold = (text) => {
      if (!text) return null;
      const str = extractString(text);
      const parts = str.split(/(\*\*.*?\*\*)/g);
      return parts.map((part, i) => {
        if (part.startsWith('**') && part.endsWith('**')) {
          return <strong key={i} className="text-cover font-bold" style={{ background: 'linear-gradient(180deg, transparent 58%, rgba(74,158,92,.18) 58%)', padding: '0 2px' }}>{part.slice(2, -2)}</strong>;
        }
        return <span key={i}>{part}</span>;
      });
    };

    const FormattedParagraphs = ({ text, className }) => {
      if (!text) return null;
      let cleaned = cleanTextStr(text);
      cleaned = cleaned.replace(/\\n/g, '\n');
      const paragraphs = cleaned.split('\n').filter(p => p.trim() !== '');
      if (paragraphs.length === 0) return <span className="text-ink-faint italic">설명이 누락되었어.</span>;
      return (
        <div className={`space-y-3 ${className}`}>
          {paragraphs.map((p, i) => (
            <p key={i} className="leading-relaxed whitespace-pre-wrap" style={{ textAlign: 'justify', wordBreak: 'keep-all' }}>{renderWithBold(p.trim())}</p>
          ))}
        </div>
      );
    };

    const imageUrlToBase64 = async (url) => {
      try {
        const response = await fetch(url, { mode: 'cors' });
        const blob = await response.blob();
        return new Promise((resolve) => {
          const reader = new FileReader();
          reader.onloadend = () => resolve(reader.result.split(',')[1]);
          reader.readAsDataURL(blob);
        });
      } catch (error) { console.error("Image load failed:", error); return null; }
    };

    const callGeminiAPI = async (prompt, systemInstruction, imageBase64 = null, responseSchema = null) => {
      const parts = [{ text: prompt }];
      if (imageBase64) { parts.push({ inlineData: { mimeType: "image/png", data: imageBase64 } }); }
      const payload = { contents: [{ parts }], systemInstruction: { parts: [{ text: systemInstruction }] }, generationConfig: {} };
      if (responseSchema) { payload.generationConfig.responseMimeType = "application/json"; payload.generationConfig.responseSchema = responseSchema; }
      let attempt = 0;
      const delays = [1000, 2000, 4000, 8000];
      while (attempt < 4) {
        try {
          const response = await fetch(WORKER_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
          if (!response.ok) throw new Error(`API Error: ${response.status}`);
          const data = await response.json();
          const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
          if (responseSchema) {
            try { let cleanText = text.trim(); if (cleanText.startsWith('```')) { cleanText = cleanText.replace(/^```json\n?/, '').replace(/^```\n?/, '').replace(/\n?```$/, ''); } return JSON.parse(cleanText.trim()); }
            catch (parseError) { throw new Error("Invalid JSON format from AI"); }
          }
          return text;
        } catch (error) { attempt++; if (attempt >= 4) throw error; await new Promise(r => setTimeout(r, delays[attempt - 1])); }
      }
    };

    // --- PROMPTS ---
    const EXPLANATION_SCHEMA = { type: "OBJECT", properties: { correctAnswer: { type: "INTEGER" }, subject: { type: "STRING" }, intro: { type: "STRING" }, coreConcept: { type: "OBJECT", properties: { title: { type: "STRING" }, content: { type: "STRING" } }, required: ["title", "content"] }, options: { type: "ARRAY", items: { type: "OBJECT", properties: { label: { type: "STRING" }, text: { type: "STRING" }, isCorrect: { type: "BOOLEAN" }, detail: { type: "STRING" } }, required: ["label", "text", "isCorrect", "detail"] } }, outro: { type: "STRING" }, concepts: { type: "ARRAY", items: { type: "STRING" } } }, required: ["correctAnswer", "subject", "intro", "coreConcept", "options", "concepts"] };
    const CONCEPT_SCHEMA = { type: "OBJECT", properties: { title: { type: "STRING" }, etymology: { type: "OBJECT", properties: { hasHanja: { type: "BOOLEAN" }, hanjaTerm: { type: "STRING" }, hanjaMeaning: { type: "STRING" }, hasLoanword: { type: "BOOLEAN" }, loanwordTerm: { type: "STRING" }, loanwordMeaning: { type: "STRING" } }, required: ["hasHanja", "hanjaTerm", "hanjaMeaning", "hasLoanword", "loanwordTerm", "loanwordMeaning"] }, definition: { type: "OBJECT", properties: { summary: { type: "STRING" }, detail: { type: "STRING" } }, required: ["summary", "detail"] }, analogyAndStory: { type: "OBJECT", properties: { title: { type: "STRING" }, content: { type: "STRING" } }, required: ["title", "content"] }, relatedConcepts: { type: "ARRAY", items: { type: "STRING" } } }, required: ["title", "etymology", "definition", "analogyAndStory", "relatedConcepts"] };
    const SUMMARY_SCHEMA = { type: "OBJECT", properties: { title: { type: "STRING" }, content: { type: "STRING" } }, required: ["title", "content"] };

    const EXPLANATION_FEW_SHOT = `당신은 똑똑하고 다정하며 논리적인 1타 과학 선생님이야. 주어진 문제 이미지를 분석하고 하드코딩된 정답을 기반으로 아래 JSON 포맷으로 해설을 작성해.
[절대 규칙]
1. 존댓말 금지. 반말투 유지.
2. 이모지 금지. **단어** 형식 강조만 허용.
3. title 필드 마크다운 금지.
4. 단락 구분 '\\n\\n' 필수.
5. [매우 중요] 문제에 보기(ㄱ, ㄴ, ㄷ 또는 가, 나, 다 등)가 있는 경우, 선지(1번, 2번, 3번...) 단위로 묶어서 뭉뚱그려 해설하지 말고, 반드시 각 보기(ㄱ, ㄴ, ㄷ) 단위를 개별 항목으로 나누어 분석해. 
   - options 배열의 label에 'ㄱ', 'ㄴ', 'ㄷ' (혹은 '가', '나', '다')을 넣고 각각이 왜 맞고 틀린지 개별적으로 상세히 설명해. 
   - 보기가 아예 없는 단순 5지선다형 문제일 때만 예외적으로 1~5번 선지를 해설해.
6. 모든 개별 보기 설명이 끝난 후, options 배열 마지막 항목으로 label: '정답 도출'을 추가하여, 최종적으로 앞서 분석한 보기들을 바탕으로 왜 해당 번호가 최종 정답인지 1~2문장으로 결론을 지어줘.`;

    const CONCEPT_FEW_SHOT = `당신은 다정하고 차분한 1타 과학 선생님이야. 학생이 물어본 과학 개념어를 아래 JSON 포맷에 맞게 설명해 줘.\n[절대 규칙]\n1. 반말투 유지.\n2. 이모지 금지.\n3. title 필드 마크다운 금지.\n4. 어원 뜻 풀이 상세하게 작성.\n5. 비유와 스토리 필수.`;

    // --- COMPONENTS ---
    const ChatInput = ({ onSubmit, placeholder, className }) => {
      const [input, setInput] = useState('');

              <div className="flex flex-wrap gap-2 justify-center mb-5">
                {[...originalConcepts, ...newConcepts].map((cName, idx) => (
                  <button key={idx} onClick={() => onNextConcept(cName)} className="font-sans-kr px-3 py-1 bg-white border border-paper-edge hover:border-accent hover:text-accent text-ink-light rounded text-[0.76rem] font-medium transition-colors" style={{ boxShadow: '0 1px 2px rgba(0,0,0,.04)' }}>
                    {cName}
                  </button>
                ))}
              </div>
              <ChatInput onSubmit={onNextConcept} placeholder="질문 입력하기" />
            </div>
          </div>

          <button onClick={onNextProblem} className="w-full bg-accent text-white py-3 rounded-lg font-sans-kr font-medium hover:bg-cover transition-colors flex items-center justify-center gap-2 mt-6 text-sm" style={{ boxShadow: '0 2px 8px rgba(61,122,74,.2)' }}>
            {returnText} <ChevronRight size={14} />
          </button>
        </div>
      );

      return <BookLayout leftPage={leftContent} rightPage={rightContent} onGoHome={onGoHome} pageNumLeft={pageNumLeft} pageNumRight={pageNumRight} />;
    };

    const SummaryView = ({ sessionData, explanations, summaryFeedback, isGeneratingSummary, onReviewIncorrect, onConceptClick, onGoHome, pageNumLeft, pageNumRight }) => {
      const { queue, answers } = sessionData;
      const total = queue.length;
      const incorrectProblemIds = queue.filter(id => {
        const prob = INITIAL_PROBLEMS.find(p => p.id === id);
        return parseInt(answers[id]) !== prob.correctAnswer;
      });
      const correctCount = total - incorrectProblemIds.length;
      const score = Math.round((correctCount / total) * 100);

      const leftContent = (
        <div className="flex flex-col h-full animate-fade-in justify-center items-center py-6">
          <div className="w-8 h-0.5 bg-accent mb-5"></div>
          <Target size={36} className="text-accent mb-3" />
          <h2 className="text-xl font-bold text-ink mb-6 font-serif-kr tracking-tight">학습 총평</h2>

          <div className="flex justify-center items-center gap-6 bg-white p-6 rounded-lg border w-full max-w-[280px]" style={{ borderColor: 'rgba(44,36,22,.06)', boxShadow: '0 1px 4px rgba(0,0,0,.06)' }}>
            <div className="text-center">
              <div className="text-2xl font-black text-ink font-serif-kr">{correctCount}<span className="text-sm text-ink-faint">/{total}</span></div>
              <div className="font-sans-kr text-[0.68rem] font-medium text-ink-faint mt-1">정답 수</div>
            </div>
            <div className="h-10 w-px bg-paper-edge"></div>
            <div className="text-center">
              <div className={`text-2xl font-black font-serif-kr ${score >= 80 ? 'text-accent' : score >= 50 ? 'text-gold' : 'text-red-soft'}`}>
                {score}<span className="text-sm">점</span>
              </div>
              <div className="font-sans-kr text-[0.68rem] font-medium text-ink-faint mt-1">달성률</div>
            </div>
          </div>
        </div>
      );

      const rightContent = (
        <div className="flex flex-col gap-5 animate-fade-in pb-6">
          {/* Teacher feedback */}
          <div className="teacher-box rounded-lg p-4">
            <div className="flex items-start gap-2.5">
              <img src={TEACHER_ICON} alt="선생님" className="w-8 h-8 shrink-0 rounded-full border border-paper-edge bg-white shadow-sm" />
              <div className="flex-1 min-w-0 pt-0.5">
                <h3 className="font-sans-kr font-bold text-accent mb-1.5 text-sm">김수석 선생님의 피드백</h3>
                {isGeneratingSummary ? (
                  <div className="flex items-center gap-2 text-ink-light text-sm font-sans-kr">
                    <Loader2 className="w-4 h-4 animate-spin" /> 따뜻한 분석을 작성 중이야...
                  </div>
                ) : summaryFeedback ? (
                  <div>
                    <h4 className="font-bold text-ink mb-1 text-[0.82rem]">{cleanTitleStr(summaryFeedback.title)}</h4>
                    <FormattedParagraphs text={summaryFeedback.content} className="text-ink-light text-[0.82rem] leading-relaxed" />
                  </div>
                ) : null}
              </div>
            </div>
          </div>

          {incorrectProblemIds.length > 0 && (
            <div className="bg-white p-4 rounded-lg border mt-1" style={{ borderColor: 'rgba(166,61,47,.15)', boxShadow: '0 1px 3px rgba(0,0,0,.04)' }}>
              <h3 className="font-sans-kr text-sm font-bold flex items-center gap-1.5 mb-1.5 text-ink"><RotateCcw size={14} className="text-red-soft" /> 오답 노트</h3>
              <p className="font-sans-kr text-ink-light text-[0.76rem] mb-3">틀린 문제를 다시 풀어보며 약점을 보완하세요.</p>
              <button onClick={() => onReviewIncorrect(incorrectProblemIds)} className="w-full py-2.5 rounded-lg font-sans-kr font-medium transition-colors flex items-center justify-center gap-1.5 text-[0.82rem]" style={{ background: 'rgba(166,61,47,.06)', color: '#a63d2f', border: '1px solid rgba(166,61,47,.2)' }}>
                <RefreshCw size={13} /> 틀린 문제만 다시 풀기
              </button>
            </div>
          )}

          <button onClick={onGoHome} className="w-full bg-accent text-white py-3 rounded-lg font-sans-kr font-medium hover:bg-cover transition-colors mt-auto text-sm" style={{ boxShadow: '0 2px 8px rgba(61,122,74,.2)' }}>
            처음으로 돌아가기
          </button>
        </div>
      );

      return <BookLayout leftPage={leftContent} rightPage={rightContent} onGoHome={onGoHome} pageNumLeft={pageNumLeft} pageNumRight={pageNumRight} />;
    };

    // --- MAIN APP ---
    function App() {
      const [appState, setAppState] = useState('HOME');
      const [sessionData, setSessionData] = useState({ mode: null, queue: [], currentIndex: 0, answers: {} });
      const [generatedExplanations, setGeneratedExplanations] = useState({});
      const [generatedConcepts, setGeneratedConcepts] = useState({});
      const [summaryFeedback, setSummaryFeedback] = useState(null);
      const [isGeneratingSummary, setIsGeneratingSummary] = useState(false);
      const [prefetchStatus, setPrefetchStatus] = useState({});
      const [isWaitingForExplanation, setIsWaitingForExplanation] = useState(false);
      const prefetchRef = useRef({});
      const [viewingConceptName, setViewingConceptName] = useState(null);

      const handleGoHome = () => {
        setAppState('HOME'); setSessionData({ mode: null, queue: [], currentIndex: 0, answers: {} });
        setIsWaitingForExplanation(false); setSummaryFeedback(null);
      };

      const startSession = (mode, options = {}) => {
        let queue = [];
        if (mode === 'full') queue = INITIAL_PROBLEMS.map(p => p.id);
        else queue = INITIAL_PROBLEMS.filter(p => p.subject === options.subject).map(p => p.id);
        if (queue.length === 0) return alert("해당 조건의 문제가 없어.");
        setSessionData({ mode, queue, currentIndex: 0, answers: {} });
        setIsWaitingForExplanation(false); setSummaryFeedback(null); setAppState('SOLVE');
      };

      const startReviewSession = (incorrectIds) => {
        setSessionData({ mode: 'review', queue: incorrectIds, currentIndex: 0, answers: {} });
        setIsWaitingForExplanation(false); setSummaryFeedback(null); setAppState('SOLVE');
      };

      const handleNextProblem = () => {
        if (sessionData.currentIndex >= sessionData.queue.length - 1) setAppState('SUMMARY');
        else { setSessionData(prev => ({ ...prev, currentIndex: prev.currentIndex + 1 })); setIsWaitingForExplanation(false); setAppState('SOLVE'); }
      };

      const handlePrevProblem = () => {
        if (sessionData.currentIndex > 0) { setSessionData(prev => ({ ...prev, currentIndex: prev.currentIndex - 1 })); setIsWaitingForExplanation(false); setAppState('SOLVE'); }
      };

      const currentProblemId = sessionData.queue[sessionData.currentIndex];
      const currentProblem = INITIAL_PROBLEMS.find(p => p.id === currentProblemId);

      useEffect(() => {
        if (appState === 'SOLVE' && currentProblem) {
          const pId = currentProblem.id;
          if (generatedExplanations[pId] || prefetchRef.current[pId]) return;
          prefetchRef.current[pId] = true;
          setPrefetchStatus(prev => ({ ...prev, [pId]: 'loading' }));
          const prefetchExplanation = async () => {
            try {
              const base64Img = await imageUrlToBase64(currentProblem.imageUrl);
              const prompt = `이 문제의 실제 정답은 무조건 **${currentProblem.correctAnswer}번**이야. 정답이 ${currentProblem.correctAnswer}번이라는 절대적인 전제 하에, 논리적으로 모순이 없도록 각 선지를 분석하고 상세 해설을 제공해. 실제 이미지를 분석해서 물리, 화학, 생명과학, 지구과학 중 어느 과목인지 판단해 'subject'에 적어.`;
              const result = await callGeminiAPI(prompt, EXPLANATION_FEW_SHOT, base64Img, EXPLANATION_SCHEMA);
              setGeneratedExplanations(prev => ({ ...prev, [pId]: result }));
              setPrefetchStatus(prev => ({ ...prev, [pId]: 'done' }));
            } catch (error) { setPrefetchStatus(prev => ({ ...prev, [pId]: 'error' })); }
          };
          prefetchExplanation();
        }
      }, [appState, currentProblem]);

      useEffect(() => {
        if (appState === 'SUMMARY' && !summaryFeedback && !isGeneratingSummary) {
          setIsGeneratingSummary(true);
          const generateSummary = async () => {
            const total = sessionData.queue.length;
            const incorrectIds = sessionData.queue.filter(id => parseInt(sessionData.answers[id]) !== INITIAL_PROBLEMS.find(p => p.id === id).correctAnswer);
            const correctCount = total - incorrectIds.length;
            const score = Math.round((correctCount / total) * 100);
            const incorrectSubjects = Array.from(new Set(incorrectIds.map(id => INITIAL_PROBLEMS.find(p => p.id === id).subject)));
            const prompt = `학생이 방금 과학 모의고사를 풀었어. 총 ${total}문제 중 ${correctCount}문제를 맞췄고, 정답률은 ${score}%야. ${incorrectIds.length > 0 ? `틀린 과목은 [${incorrectSubjects.join(', ')}]야.` : '틀린 문제가 없어 완벽해!'} 이 결과를 바탕으로, 1타 과학 강사 김수석의 다정하고 따뜻한 반말투로 총평(피드백)을 작성해줘. 학생이 노력한 점을 아낌없이 칭찬하고 격려하는 것을 위주로 작성하며, 틀린 부분에 대해서는 부드럽고 긍정적인 방향으로 보완할 점을 짚어줘. 절대 너무 날카롭거나 혼내는 듯한 말투는 쓰지 마. title에는 마크다운을 절대 쓰지 마. content에는 단락 구분을 위해 '\\n\\n'을 꼭 쓰고, 중요한 단어만 **단어** 로 강조해.`;
            try {
              const result = await callGeminiAPI(prompt, "너는 통찰력 있고 다정하며 학생을 아끼는 1타 과학 강사야.", null, SUMMARY_SCHEMA);
              setSummaryFeedback(result);
            } catch (e) { setSummaryFeedback({ title: "학습 완료!", content: "수고 정말 많았어! 결과 데이터를 확인하고 약점을 천천히 보완해보자." }); }
            finally { setIsGeneratingSummary(false); }
          };
          generateSummary();
        }
      }, [appState, sessionData, summaryFeedback, isGeneratingSummary]);

      const applyFallbackAndGo = (pId) => {
        const fallbackResult = { correctAnswer: currentProblem?.correctAnswer || 1, subject: "오류", intro: "선생님이 해설을 준비하다가 오류가 났어. 다시 시도해 줘.", coreConcept: { title: "분석 실패", content: "데이터를 불러오지 못했어." }, options: [], outro: "기다리게 해서 미안해.", concepts: [] };
        setGeneratedExplanations(prev => ({ ...prev, [pId]: fallbackResult }));
        setAppState('EXPLAIN');
      };

      const handleSubmitAnswer = async (answer) => {
        if (!currentProblem) return;
        setSessionData(prev => ({ ...prev, answers: { ...prev.answers, [currentProblem.id]: answer } }));
        const status = prefetchStatus[currentProblem.id];
        if (status === 'done' && generatedExplanations[currentProblem.id]) setAppState('EXPLAIN');
        else if (status === 'error') applyFallbackAndGo(currentProblem.id);
        else setIsWaitingForExplanation(true);
      };

      useEffect(() => {
        if (isWaitingForExplanation && currentProblem) {
          const status = prefetchStatus[currentProblem.id];
          if (status === 'done') { setIsWaitingForExplanation(false); setAppState('EXPLAIN'); }
          else if (status === 'error') { setIsWaitingForExplanation(false); applyFallbackAndGo(currentProblem.id); }
        }
      }, [isWaitingForExplanation, prefetchStatus, currentProblem]);

      const handleConceptClick = async (conceptName) => {
        if (generatedConcepts[conceptName]) { setViewingConceptName(conceptName); setAppState('CONCEPT'); return; }
        setAppState('LOADING_CONCEPT');
        try {
          const prompt = `과학 개념어 '${conceptName}'에 대해 쉽게 설명해줘. 어원 분석 시 한자와 외래어를 구분해서 상세히 적어줘.`;
          let result;
          try { result = await callGeminiAPI(prompt, CONCEPT_FEW_SHOT, null, CONCEPT_SCHEMA); }
          catch (apiError) {
            result = { title: conceptName, etymology: { hasHanja: false, hanjaTerm: "", hanjaMeaning: "", hasLoanword: false, loanwordTerm: "", loanwordMeaning: "" }, definition: { summary: "개념을 불러오지 못했어.", detail: "네트워크 문제일 수 있어. 다시 시도해 줘." }, analogyAndStory: { title: "오류", content: "응답을 처리할 수 없네." }, relatedConcepts: [] };
          }
          setGeneratedConcepts(prev => ({ ...prev, [conceptName]: result }));
          setViewingConceptName(conceptName); setAppState('CONCEPT');
        } catch (error) { alert("개념 정리 중 오류가 발생했어."); setAppState(appState === 'SUMMARY' ? 'SUMMARY' : 'EXPLAIN'); }
      };

      const currentExplanation = generatedExplanations[currentProblemId];
      const safeViewingName = cleanTitleStr(viewingConceptName || '');
      const originalConcepts = (currentExplanation?.concepts || []).map(extractString).map(cleanTitleStr).filter(c => c && c !== safeViewingName);
      const newConcepts = (generatedConcepts[viewingConceptName]?.relatedConcepts || []).map(extractString).map(cleanTitleStr).filter(c => c && c !== safeViewingName && !originalConcepts.includes(c));
      const isSessionComplete = sessionData.currentIndex >= sessionData.queue.length - 1 && Object.keys(sessionData.answers).length === sessionData.queue.length;
      const conceptReturnText = isSessionComplete ? '이제 확실히 알겠어! 결과 보기' : '이제 확실히 알겠어! 문제로 복귀';

      const currentLeftPage = (sessionData.currentIndex * 2) + 3;
      const currentRightPage = (sessionData.currentIndex * 2) + 4;
      const summaryLeftPage = (sessionData.queue.length * 2) + 3;
      const summaryRightPage = (sessionData.queue.length * 2) + 4;

      return (
        <React.Fragment>
          {appState === 'HOME' && <HomeView onStart={startSession} />}
          {appState === 'SOLVE' && currentProblem && <SolveView problem={currentProblem} isSubmitting={isWaitingForExplanation} onSubmit={handleSubmitAnswer} onPrev={handlePrevProblem} onNext={handleNextProblem} isFirst={sessionData.currentIndex === 0} isLast={sessionData.currentIndex === sessionData.queue.length - 1} currentIndex={sessionData.currentIndex} totalProblems={sessionData.queue.length} onGoHome={handleGoHome} pageNumLeft={currentLeftPage} pageNumRight={currentRightPage} />}
          {appState === 'EXPLAIN' && currentProblem && currentExplanation && <ExplainView explanation={currentExplanation} problem={currentProblem} userAnswer={sessionData.answers[currentProblem.id]} onConceptClick={handleConceptClick} onNextProblem={handleNextProblem} isLastProblem={sessionData.currentIndex === sessionData.queue.length - 1} onGoHome={handleGoHome} pageNumLeft={currentLeftPage} pageNumRight={currentRightPage} />}
          {appState === 'LOADING_CONCEPT' && (
            <BookLayout
              leftPage={<div className="flex flex-col items-center justify-center h-full"><Loader2 className="w-8 h-8 text-accent animate-spin mb-3" /><p className="font-sans-kr font-medium text-sm text-ink-light">개념 정리 중...</p></div>}
              rightPage={<div className="flex flex-col items-center justify-center h-full opacity-50"><p className="font-sans-kr text-ink-faint text-sm">잠시만 기다려주세요.</p></div>}
              onGoHome={handleGoHome} pageNumLeft={currentLeftPage} pageNumRight={currentRightPage}
            />
          )}
          {appState === 'CONCEPT' && viewingConceptName && generatedConcepts[viewingConceptName] && <ConceptView concept={generatedConcepts[viewingConceptName]} originalConcepts={originalConcepts} newConcepts={newConcepts} returnText={conceptReturnText} onNextConcept={handleConceptClick} onNextProblem={() => { if (isSessionComplete) setAppState('SUMMARY'); else setAppState('EXPLAIN'); }} onGoHome={handleGoHome} pageNumLeft={currentLeftPage} pageNumRight={currentRightPage} />}
          {appState === 'SUMMARY' && <SummaryView sessionData={sessionData} explanations={generatedExplanations} summaryFeedback={summaryFeedback} isGeneratingSummary={isGeneratingSummary} onReviewIncorrect={startReviewSession} onConceptClick={handleConceptClick} onGoHome={handleGoHome} pageNumLeft={summaryLeftPage} pageNumRight={summaryRightPage} />}
        </React.Fragment>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>

</html>
