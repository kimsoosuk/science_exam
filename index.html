    // --- UTILS: 텍스트 정제 및 렌더링 도구 ---
    const extractString = (val) => {
      if (!val) return '';
      if (typeof val === 'string') return val;
      if (typeof val === 'object') return val.name || val.term || val.title || JSON.stringify(val);
      return String(val);
    };

    const cleanTextStr = (val) => {
      let str = extractString(val);
      str = str.replace(/[\u{1F600}-\u{1F64F}\u{1F300}-\u{1F5FF}\u{1F680}-\u{1F6FF}\u{1F700}-\u{1F77F}\u{1F780}-\u{1F7FF}\u{1F800}-\u{1F8FF}\u{1F900}-\u{1F9FF}\u{1FA00}-\u{1FA6F}\u{1FA70}-\u{1FAFF}\u{1FAB0}-\u{1FABF}\u{1FAC0}-\u{1FAFF}\u{1F1E6}-\u{1F1FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}]/gu, '');
      str = str.replace(/#/g, '');
      return str.trim();
    };

    const cleanTitleStr = (val) => {
      let str = cleanTextStr(val);
      return str.replace(/\*/g, '').replace(/_/g, '');
    };

    const renderWithBold = (text) => {
      if (!text) return null;
      const str = extractString(text);

      const parts = str.split(/(\*\*.*?\*\*)/g);
      return parts.map((part, i) => {
        if (part.startsWith('**') && part.endsWith('**')) {
          return <strong key={i} className="text-indigo-700 font-bold bg-indigo-50/50 px-1 rounded mx-0.5">{part.slice(2, -2)}</strong>;
        }
        return <span key={i}>{part}</span>;
      });
    };

    const FormattedParagraphs = ({ text, className }) => {
      if (!text) return null;
      let cleaned = cleanTextStr(text);
      cleaned = cleaned.replace(/\\n/g, '\n');
      const paragraphs = cleaned.split('\n').filter(p => p.trim() !== '');

      if (paragraphs.length === 0) return <span className="text-slate-400 italic font-medium">설명이 누락되었어.</span>;

      return (
        <div className={`space-y-3 ${className}`}>
          {paragraphs.map((p, i) => (
            <p key={i} className="leading-relaxed whitespace-pre-wrap">{renderWithBold(p.trim())}</p>
          ))}
        </div>
      );
    };

    const imageUrlToBase64 = async (url) => {
      try {
        const response = await fetch(url, { mode: 'cors' });
        const blob = await response.blob();
        return new Promise((resolve) => {
          const reader = new FileReader();
          reader.onloadend = () => resolve(reader.result.split(',')[1]);
          reader.readAsDataURL(blob);
        });
      } catch (error) {
        console.error("Image load failed:", error);
        return null;
      }
    };

    // 프론트엔드 API 호출부를 수정하여 Worker로 전달
    const callGeminiAPI = async (prompt, systemInstruction, imageBase64 = null, responseSchema = null) => {
      const parts = [{ text: prompt }];
      if (imageBase64) {
        parts.push({ inlineData: { mimeType: "image/png", data: imageBase64 } });
      }

      const payload = {
        contents: [{ parts }],
        systemInstruction: { parts: [{ text: systemInstruction }] },
        generationConfig: {}
      };

      if (responseSchema) {
        payload.generationConfig.responseMimeType = "application/json";
        payload.generationConfig.responseSchema = responseSchema;
      }

      let attempt = 0;
      const delays = [1000, 2000, 4000, 8000];

      while (attempt < 4) {
        try {
          // 직접 API 호출 대신 Worker 주소 사용
          const response = await fetch(WORKER_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });

          if (!response.ok) throw new Error(`API Error: ${response.status}`);

          const data = await response.json();
          const text = data.candidates?.[0]?.content?.parts?.[0]?.text;

          if (responseSchema) {
            try {
              let cleanText = text.trim();
              if (cleanText.startsWith('```')) {
                cleanText = cleanText.replace(/^```json\n?/, '').replace(/^```\n?/, '').replace(/\n?```$/, '');
              }
              return JSON.parse(cleanText.trim());
            } catch (parseError) {
              throw new Error("Invalid JSON format from AI");
            }
          }
          return text;
        } catch (error) {
          attempt++;
          if (attempt >= 4) throw error;
          await new Promise(r => setTimeout(r, delays[attempt - 1]));
        }
      }
    };

    const CONCEPT_FEW_SHOT = `당신은 다정하고 차분한 1타 과학 선생님이야. 학생이 물어본 과학 개념어를 아래 JSON 포맷에 맞게 설명해 줘.

            <h3 className="text-xl font-bold flex items-center gap-2 mb-5 text-slate-800"><BookOpen className="w-6 h-6 text-indigo-500" /> 개념 정의</h3>
            <div className="space-y-6">
              <p className="font-bold text-[18px] text-indigo-900 bg-indigo-50/50 p-5 rounded-2xl border border-indigo-100 leading-relaxed">{renderWithBold(defSummary)}</p>
              <div className="pl-3 border-l-4 border-indigo-300"><FormattedParagraphs text={defDetail} className="text-[17px] text-slate-700" /></div>
            </div>
          </section>
          {storyContent && (
            <section className="bg-orange-50/80 p-8 rounded-3xl shadow-sm border border-orange-200">
              <h3 className="text-xl font-bold flex items-center gap-2 mb-6 text-orange-900"><Sparkles className="w-6 h-6 text-orange-500" /> 비유와 스토리로 쉽게 이해하기</h3>
              <div className="space-y-5">
                <h4 className="font-bold text-orange-950 text-[20px] border-b border-orange-200 pb-3">{storyTitle}</h4>
                <div className="pl-3 border-l-4 border-orange-300"><FormattedParagraphs text={storyContent} className="text-[17px] text-orange-950/80" /></div>
              </div>
            </section>
          )}
          <div className="mt-8">
            <div className="flex flex-col gap-6">
              <div className="flex flex-col items-center">
                {(originalConcepts.length > 0 || newConcepts.length > 0) && (
                  <>
                    <p className="text-lg text-slate-600 font-bold mb-4 flex items-center gap-2"><ArrowRight className="w-5 h-5 text-indigo-500" /> 이어서 볼 관련 개념</p>
                    {originalConcepts.length > 0 && (
                      <div className="flex flex-wrap justify-center gap-3 w-full px-2 mb-4">
                        {originalConcepts.map((cName, idx) => (
                          <button key={`orig-${idx}`} onClick={() => onNextConcept(cName)} className="px-5 py-2.5 bg-indigo-600 text-white rounded-full text-[16px] font-bold hover:bg-indigo-700 hover:-translate-y-0.5 transition-all shadow-md flex items-center justify-center gap-2">
                            <BookOpen size={18} className="shrink-0 text-indigo-200" /> {cName}
                          </button>
                        ))}
                      </div>
                    )}
                    {newConcepts.length > 0 && (
                      <div className="flex flex-wrap justify-center gap-3 w-full px-2 mt-2 mb-6">
                        {newConcepts.map((cName, idx) => (
                          <button key={`new-${idx}`} onClick={() => onNextConcept(cName)} className="px-5 py-2 border-2 border-indigo-200 text-indigo-700 rounded-full text-[15px] font-bold bg-white hover:bg-indigo-50 hover:border-indigo-500 transition-colors flex items-center justify-center gap-2 shadow-sm">
                            <Lightbulb size={18} className="shrink-0 text-yellow-500" /> {cName}
                          </button>
                        ))}
                      </div>
                    )}
                  </>
                )}
                <div className="w-full mt-4"><ChatInput onSubmit={onNextConcept} placeholder="궁금한 게 더 있으면 물어봐!" /></div>
              </div>
              <hr className="border-t-2 border-slate-200 my-2" />
              <button onClick={onNextProblem} className="w-full bg-slate-900 text-white py-5 rounded-3xl font-bold hover:bg-slate-800 shadow-xl flex items-center justify-center gap-3 transition-colors text-xl">
                {returnText} <ChevronRight className="w-7 h-7" />
              </button>
            </div>
          </div>
        </div>
      );
    };

    const SummaryView = ({ sessionData, explanations, summaryFeedback, isGeneratingSummary, onReviewIncorrect, onConceptClick, onGoHome }) => {
      const { queue, answers } = sessionData;
      const total = queue.length;
      const incorrectProblemIds = queue.filter(id => {
        const prob = INITIAL_PROBLEMS.find(p => p.id === id);
        return parseInt(answers[id]) !== prob.correctAnswer;
      });
      const correctCount = total - incorrectProblemIds.length;
      const score = Math.round((correctCount / total) * 100);
      const reviewConceptsRaw = incorrectProblemIds.flatMap(id => explanations[id]?.concepts || []);
      const reviewConcepts = Array.from(new Set(reviewConceptsRaw.map(extractString).map(cleanTitleStr))).filter(Boolean);

      return (
        <div className="flex flex-col gap-6 py-8 animate-fade-in w-full max-w-2xl mx-auto p-4">
          <div className="bg-white p-8 rounded-3xl shadow-md border-t-8 border-indigo-600 text-center">
            <Target size={60} className="mx-auto text-indigo-500 mb-4" />
            <h2 className="text-3xl font-bold text-slate-900 mb-2">학습 총평</h2>
            <p className="text-slate-600 text-lg mb-6">수고했어! 방금 푼 세션의 결과를 확인해 보자.</p>
            <div className="flex justify-center items-center gap-8 bg-slate-50 p-6 rounded-2xl border border-slate-100">
              <div className="text-center">
                <div className="text-4xl font-black text-slate-800">{correctCount}<span className="text-xl text-slate-400">/{total}</span></div>
                <div className="text-sm font-bold text-slate-500 mt-1">맞춘 문제</div>
              </div>
              <div className="h-16 w-px bg-slate-300"></div>
              <div className="text-center">
                <div className={`text-4xl font-black ${score >= 80 ? 'text-green-600' : score >= 50 ? 'text-yellow-500' : 'text-red-500'}`}>
                  {score}<span className="text-xl">점</span>
                </div>
                <div className="text-sm font-bold text-slate-500 mt-1">정답률</div>
              </div>
            </div>
          </div>
          <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 relative overflow-hidden">
            <div className="absolute top-0 left-0 w-2 h-full bg-indigo-500"></div>
            <div className="flex items-start gap-4">
              <img src={TEACHER_ICON} alt="선생님" className="w-14 h-14 rounded-full border-2 border-white shadow-md shrink-0 bg-white object-cover z-10" />
              <div className="flex-1 mt-1">
                <h3 className="font-bold text-lg text-indigo-900 mb-3">김수석 선생님의 맞춤 피드백</h3>
                {isGeneratingSummary ? (
                  <div className="flex flex-col items-center py-4">
                    <Loader2 className="w-8 h-8 text-indigo-400 animate-spin mb-2" />
                    <p className="text-sm text-slate-500 font-medium">네 결과를 분석해서 피드백을 작성하고 있어...</p>
                  </div>
                ) : summaryFeedback ? (
                  <div className="bg-indigo-50/50 p-5 rounded-2xl border border-indigo-100">
                    <h4 className="font-bold text-indigo-800 mb-3 text-[17px]">{cleanTitleStr(summaryFeedback.title)}</h4>
                    <FormattedParagraphs text={summaryFeedback.content} className="text-slate-700 text-[16px] font-medium" />
                  </div>
                ) : (
                  <p className="text-slate-500 italic">총평을 불러올 수 없어.</p>
                )}
              </div>
            </div>
          </div>
          {incorrectProblemIds.length > 0 ? (
            <>
              <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                <h3 className="text-xl font-bold flex items-center gap-2 mb-4 text-slate-900"><RotateCcw className="text-red-500" /> 오답 노트 (틀린 문제 다시 풀기)</h3>
                <p className="text-slate-600 text-[15px] mb-4">틀린 문제를 다시 한번 풀어보면 실력이 확실히 늘 거야.</p>
                <button onClick={() => onReviewIncorrect(incorrectProblemIds)} className="w-full bg-red-50 text-red-600 border-2 border-red-200 py-4 rounded-2xl font-bold hover:bg-red-100 transition-colors flex items-center justify-center gap-2 text-lg">
                  <RefreshCw size={20} /> 틀린 문제만 다시 풀기
                </button>
              </div>
              {reviewConcepts.length > 0 && (
                <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                  <h3 className="text-xl font-bold flex items-center gap-2 mb-4 text-slate-900"><Brain className="text-indigo-500" /> 오답 기반 맞춤 개념 추천</h3>
                  <p className="text-slate-600 text-[15px] mb-4 leading-relaxed">네가 틀렸던 문제들에 나왔던 핵심 개념들이야. 이것만 확실히 잡고 가도 다음엔 안 틀릴 거야! 클릭해서 바로 복습해 봐.</p>
                  <div className="flex flex-wrap gap-2">
                    {reviewConcepts.map((cName, idx) => (
                      <button key={idx} onClick={() => onConceptClick(cleanTitleStr(cName))} className="px-5 py-2.5 bg-indigo-600 text-white rounded-full text-[15px] font-bold hover:bg-indigo-700 hover:-translate-y-0.5 transition-all shadow-md flex items-center gap-2">
                        <BookOpen size={16} className="text-indigo-200" /> {cleanTitleStr(cName)}
                      </button>
                    ))}
                  </div>
                </div>
              )}
            </>
          ) : (
            <div className="bg-green-50 p-8 rounded-3xl border border-green-200 text-center">
              <Sparkles size={48} className="mx-auto text-green-500 mb-3" />
              <h3 className="text-2xl font-bold text-green-800 mb-2">백점 만점! 완벽해!</h3>
              <p className="text-green-700 font-medium">틀린 문제가 하나도 없어. 정말 대단한걸?</p>
            </div>
          )}
          <button onClick={onGoHome} className="w-full bg-slate-900 text-white py-5 rounded-3xl font-bold flex items-center justify-center gap-3 hover:bg-slate-800 transition-colors shadow-xl text-xl mt-4">
            홈으로 돌아가기
          </button>
        </div>
      );
    };

    function App() {
      const [appState, setAppState] = useState('HOME');
      const [sessionData, setSessionData] = useState({ mode: null, queue: [], currentIndex: 0, answers: {} });
      const [generatedExplanations, setGeneratedExplanations] = useState({});
      const [generatedConcepts, setGeneratedConcepts] = useState({});
      const [summaryFeedback, setSummaryFeedback] = useState(null);
      const [isGeneratingSummary, setIsGeneratingSummary] = useState(false);
      const [prefetchStatus, setPrefetchStatus] = useState({});
      const [isWaitingForExplanation, setIsWaitingForExplanation] = useState(false);
      const prefetchRef = useRef({});
      const [viewingConceptName, setViewingConceptName] = useState(null);

      useEffect(() => { window.scrollTo(0, 0); }, [appState, sessionData.currentIndex, viewingConceptName]);

      const handleGoHome = () => {
        setAppState('HOME'); setSessionData({ mode: null, queue: [], currentIndex: 0, answers: {} });
        setIsWaitingForExplanation(false); setSummaryFeedback(null);
      };

      const startSession = (mode, options = {}) => {
        let queue = [];
        if (mode === 'full') queue = INITIAL_PROBLEMS.map(p => p.id);
        else queue = INITIAL_PROBLEMS.filter(p => p.subject === options.subject).map(p => p.id);
        if (queue.length === 0) return alert("해당 조건의 문제가 없어.");
        setSessionData({ mode, queue, currentIndex: 0, answers: {} });
        setIsWaitingForExplanation(false); setSummaryFeedback(null); setAppState('SOLVE');
      };

      const startReviewSession = (incorrectIds) => {
        setSessionData({ mode: 'review', queue: incorrectIds, currentIndex: 0, answers: {} });
        setIsWaitingForExplanation(false); setSummaryFeedback(null); setAppState('SOLVE');
      }

      const handleNextProblem = () => {
        if (sessionData.currentIndex >= sessionData.queue.length - 1) setAppState('SUMMARY');
        else { setSessionData(prev => ({ ...prev, currentIndex: prev.currentIndex + 1 })); setIsWaitingForExplanation(false); setAppState('SOLVE'); }
      };

      const handlePrevProblem = () => {
        if (sessionData.currentIndex > 0) { setSessionData(prev => ({ ...prev, currentIndex: prev.currentIndex - 1 })); setIsWaitingForExplanation(false); setAppState('SOLVE'); }
      };

      const currentProblemId = sessionData.queue[sessionData.currentIndex];
      const currentProblem = INITIAL_PROBLEMS.find(p => p.id === currentProblemId);

      useEffect(() => {
        if (appState === 'SOLVE' && currentProblem) {
          const pId = currentProblem.id;
          if (generatedExplanations[pId] || prefetchRef.current[pId]) return;
          prefetchRef.current[pId] = true;
          setPrefetchStatus(prev => ({ ...prev, [pId]: 'loading' }));

          const prefetchExplanation = async () => {
            try {
              const base64Img = await imageUrlToBase64(currentProblem.imageUrl);
              const prompt = `이 문제의 실제 정답은 무조건 **${currentProblem.correctAnswer}번**이야. 정답이 ${currentProblem.correctAnswer}번이라는 절대적인 전제 하에, 논리적으로 모순이 없도록 각 선지를 분석하고 상세 해설을 제공해. 실제 이미지를 분석해서 물리, 화학, 생명과학, 지구과학 중 어느 과목인지 판단해 'subject'에 적어.`;
              const result = await callGeminiAPI(prompt, EXPLANATION_FEW_SHOT, base64Img, EXPLANATION_SCHEMA);
              setGeneratedExplanations(prev => ({ ...prev, [pId]: result }));
              setPrefetchStatus(prev => ({ ...prev, [pId]: 'done' }));
            } catch (error) {
              setPrefetchStatus(prev => ({ ...prev, [pId]: 'error' }));
            }
          };
          prefetchExplanation();
        }
      }, [appState, currentProblem]);

      useEffect(() => {
        if (appState === 'SUMMARY' && !summaryFeedback && !isGeneratingSummary) {
          setIsGeneratingSummary(true);
          const generateSummary = async () => {
            const total = sessionData.queue.length;
            const incorrectIds = sessionData.queue.filter(id => parseInt(sessionData.answers[id]) !== INITIAL_PROBLEMS.find(p => p.id === id).correctAnswer);
            const correctCount = total - incorrectIds.length;
            const score = Math.round((correctCount / total) * 100);
            const incorrectSubjects = Array.from(new Set(incorrectIds.map(id => INITIAL_PROBLEMS.find(p => p.id === id).subject)));

            const prompt = `학생이 방금 과학 모의고사를 풀었어. 총 ${total}문제 중 ${correctCount}문제를 맞췄고, 정답률은 ${score}%야. ${incorrectIds.length > 0 ? `틀린 과목은 [${incorrectSubjects.join(', ')}]야.` : '틀린 문제가 없어 완벽해!'} 이 결과를 바탕으로, 1타 과학 강사 김수석의 다정하지만 뼈를 때리는 반말투로 총평(피드백)을 작성해줘. 칭찬할 건 칭찬하되, 틀린 과목에 대해서는 어떻게 보완해야 할지 실질적이고 따끔한 조언을 해줘. title에는 마크다운을 절대 쓰지 마. content에는 단락 구분을 위해 '\\n\\n'을 꼭 쓰고, 중요한 단어만 **단어** 로 강조해.`;

            try {
              const result = await callGeminiAPI(prompt, "너는 통찰력 있고 다정한 1타 과학 강사야.", null, SUMMARY_SCHEMA);
              setSummaryFeedback(result);
            } catch (e) {
              setSummaryFeedback({ title: "학습 완료!", content: "고생했어! 결과 데이터를 확인하고 틀린 문제를 복습해보자." });
            } finally { setIsGeneratingSummary(false); }
          };
          generateSummary();
        }
      }, [appState, sessionData, summaryFeedback, isGeneratingSummary]);

      const applyFallbackAndGo = (pId) => {
        const fallbackResult = {
          correctAnswer: currentProblem?.correctAnswer || 1, subject: "오류",
          intro: "선생님이 해설을 준비하다가 네트워크가 끊겼나 봐.\n\n새로고침을 하거나 잠시 후 다시 시도해 줘.",
          coreConcept: { title: "분석 실패", content: "데이터를 불러오지 못했어." }, options: [],
          outro: "기다리게 해서 미안해.", concepts: []
        };
        setGeneratedExplanations(prev => ({ ...prev, [pId]: fallbackResult }));
        setAppState('EXPLAIN');
      };

      const handleSubmitAnswer = async (answer) => {
        if (!currentProblem) return;
        setSessionData(prev => ({ ...prev, answers: { ...prev.answers, [currentProblem.id]: answer } }));
        const status = prefetchStatus[currentProblem.id];
        if (status === 'done' && generatedExplanations[currentProblem.id]) setAppState('EXPLAIN');
        else if (status === 'error') applyFallbackAndGo(currentProblem.id);
        else setIsWaitingForExplanation(true);
      };

      useEffect(() => {
        if (isWaitingForExplanation && currentProblem) {
          const status = prefetchStatus[currentProblem.id];
          if (status === 'done') { setIsWaitingForExplanation(false); setAppState('EXPLAIN'); }
          else if (status === 'error') { setIsWaitingForExplanation(false); applyFallbackAndGo(currentProblem.id); }
        }
      }, [isWaitingForExplanation, prefetchStatus, currentProblem]);

      const handleConceptClick = async (conceptName) => {
        if (generatedConcepts[conceptName]) { setViewingConceptName(conceptName); setAppState('CONCEPT'); return; }
        setAppState('LOADING_CONCEPT');
        try {
          const prompt = `과학 개념어 '${conceptName}'에 대해 쉽게 설명해줘. 어원 분석 시 한자와 외래어를 구분해서 상세히 적어줘.`;
          let result;
          try { result = await callGeminiAPI(prompt, CONCEPT_FEW_SHOT, null, CONCEPT_SCHEMA); }
          catch (apiError) {
            result = {
              title: conceptName,
              etymology: { hasHanja: false, hanjaTerm: "", hanjaMeaning: "", hasLoanword: false, loanwordTerm: "", loanwordMeaning: "" },
              definition: { summary: "개념을 불러오지 못했어.", detail: "네트워크 문제일 수 있어. 다시 시도해 줘." },
              analogyAndStory: { title: "오류", content: "응답을 처리할 수 없네." }, relatedConcepts: []
            };
          }
          setGeneratedConcepts(prev => ({ ...prev, [conceptName]: result }));
          setViewingConceptName(conceptName); setAppState('CONCEPT');
        } catch (error) {
          alert("개념 정리 중 오류가 발생했어."); setAppState(appState === 'SUMMARY' ? 'SUMMARY' : 'EXPLAIN');
        }
      };

      const currentExplanation = generatedExplanations[currentProblemId];
      const safeViewingName = cleanTitleStr(viewingConceptName || '');
      const originalConcepts = (currentExplanation?.concepts || []).map(extractString).map(cleanTitleStr).filter(c => c && c !== safeViewingName);
      const newConcepts = (generatedConcepts[viewingConceptName]?.relatedConcepts || []).map(extractString).map(cleanTitleStr).filter(c => c && c !== safeViewingName && !originalConcepts.includes(c));
      const getHeaderTitle = () => {
        if (appState === 'HOME') return '';
        if (appState === 'SUMMARY') return '학습 총평';
        let prefix = '';
        if (sessionData.mode === 'subject' && currentProblem) prefix = `[${currentProblem.subject}] `;
        if (sessionData.mode === 'review') prefix = `[오답 복습] `;
        return `${prefix}${currentProblem?.number}번`;
      };
      const isSessionComplete = sessionData.currentIndex >= sessionData.queue.length - 1 && Object.keys(sessionData.answers).length === sessionData.queue.length;
      const conceptReturnText = isSessionComplete ? '이제 확실히 알겠어! 다음으로' : '이제 확실히 알겠어! 문제 풀이로 복귀';

      return (
        <Container title={getHeaderTitle()} onGoHome={handleGoHome}>
          {appState === 'HOME' && <HomeView onStart={startSession} />}
          {appState === 'SOLVE' && currentProblem && <SolveView problem={currentProblem} isSubmitting={isWaitingForExplanation} onSubmit={handleSubmitAnswer} onPrev={handlePrevProblem} onNext={handleNextProblem} isFirst={sessionData.currentIndex === 0} isLast={sessionData.currentIndex === sessionData.queue.length - 1} currentIndex={sessionData.currentIndex} totalProblems={sessionData.queue.length} />}
          {appState === 'EXPLAIN' && currentProblem && currentExplanation && <ExplainView explanation={currentExplanation} problem={currentProblem} userAnswer={sessionData.answers[currentProblem.id]} onConceptClick={handleConceptClick} onNextProblem={handleNextProblem} isLastProblem={sessionData.currentIndex === sessionData.queue.length - 1} />}
          {appState === 'LOADING_CONCEPT' && (
            <div className="flex flex-col items-center justify-center h-[70vh] text-center animate-fade-in">
              <Loader2 className="w-16 h-16 text-indigo-600 animate-spin mb-6" />
              <p className="font-bold text-2xl text-slate-900">선생님이 핵심을 정리하고 있어!</p>
              <p className="text-slate-600 text-lg mt-2">잠시만 기다려 줘...</p>
            </div>
          )}
          {appState === 'CONCEPT' && viewingConceptName && generatedConcepts[viewingConceptName] && <ConceptView concept={generatedConcepts[viewingConceptName]} originalConcepts={originalConcepts} newConcepts={newConcepts} returnText={conceptReturnText} onNextConcept={handleConceptClick} onNextProblem={() => { if (isSessionComplete) setAppState('SUMMARY'); else handleNextProblem(); }} />}
          {appState === 'SUMMARY' && <SummaryView sessionData={sessionData} explanations={generatedExplanations} summaryFeedback={summaryFeedback} isGeneratingSummary={isGeneratingSummary} onReviewIncorrect={startReviewSession} onConceptClick={handleConceptClick} onGoHome={handleGoHome} />}
        </Container>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>

</html>
